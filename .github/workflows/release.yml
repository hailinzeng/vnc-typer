name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package source launchers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            archive_suffix: macos.zip
          - name: linux-x86_64
            archive_suffix: linux-x86_64.tar.gz
          - name: linux-aarch64
            archive_suffix: linux-aarch64.tar.gz
          - name: windows
            archive_suffix: windows.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate release version module
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          printf 'APP_VERSION = "%s"\n' "$version" > version.py

      - name: Package release asset
        shell: bash
        run: |
          package_dir="vnc-typer-${{ github.ref_name }}-${{ matrix.name }}"
          mkdir -p "dist/${package_dir}"
          cp main.py icon.png requirements.txt README.md LICENSE THIRD_PARTY_NOTICES.md version.py "dist/${package_dir}/"
          cp scripts/run-vnc-typer.sh "dist/${package_dir}/run-vnc-typer.sh"
          cp scripts/run-vnc-typer.command "dist/${package_dir}/run-vnc-typer.command"
          cp scripts/run-vnc-typer.ps1 "dist/${package_dir}/run-vnc-typer.ps1"
          chmod +x "dist/${package_dir}/run-vnc-typer.sh" "dist/${package_dir}/run-vnc-typer.command"

          cd dist
          if [[ "${{ matrix.archive_suffix }}" == *.tar.gz ]]; then
            tar -czf "../vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}" "${package_dir}"
          else
            python -m zipfile -c "../vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}" "${package_dir}"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}
          generate_release_notes: true
