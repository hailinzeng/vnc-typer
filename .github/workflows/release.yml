name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            add_data: ""
            icon_arg: ""
            codesign_arg: ""
            vncdo_bundle_mode: ""
            windowed: ""
            archive_suffix: macos.zip
          - name: linux-x86_64
            os: ubuntu-latest
            add_data: "icon.png:."
            icon_arg: ""
            codesign_arg: ""
            vncdo_bundle_mode: "--onefile"
            windowed: ""
            archive_suffix: linux-x86_64.tar.gz
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            add_data: "icon.png:."
            icon_arg: ""
            codesign_arg: ""
            vncdo_bundle_mode: "--onefile"
            windowed: ""
            archive_suffix: linux-aarch64.tar.gz
          - name: windows
            os: windows-latest
            add_data: "icon.png;."
            icon_arg: "--icon icon.ico"
            codesign_arg: ""
            vncdo_bundle_mode: "--onefile"
            windowed: "--windowed"
            archive_suffix: windows.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate release version module
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          printf 'APP_VERSION = "%s"\n' "$version" > version.py

      - name: Generate Windows app icon
        if: runner.os == 'Windows'
        run: python scripts/make_ico.py icon.png icon.ico

      - name: Build vnc-typer
        if: runner.os != 'macOS'
        run: >
          pyinstaller
          --noconfirm
          --clean
          ${{ matrix.windowed }}
          --name vnc-typer
          ${{ matrix.icon_arg }}
          ${{ matrix.codesign_arg }}
          --add-data "${{ matrix.add_data }}"
          main.py

      - name: Build bundled vncdo command
        if: runner.os != 'macOS'
        run: >
          pyinstaller
          --noconfirm
          --clean
          --console
          ${{ matrix.vncdo_bundle_mode }}
          --name vncdo
          ${{ matrix.codesign_arg }}
          --distpath dist/vnc-typer
          vncdo_launcher.py

      - name: Package macOS release asset
        if: runner.os == 'macOS'
        shell: bash
        run: |
          package_dir="vnc-typer-${{ github.ref_name }}-${{ matrix.name }}"
          mkdir -p "dist/${package_dir}"
          cp main.py icon.png requirements.txt README.md version.py "dist/${package_dir}/"
          cat > "dist/${package_dir}/run-vnc-typer.command" <<'EOF'
          #!/bin/sh
          set -eu
          cd "$(dirname "$0")"
          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python main.py
          EOF
          chmod +x "dist/${package_dir}/run-vnc-typer.command"
          cd dist
          ditto -c -k --keepParent "${package_dir}" "../vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}"

      - name: Package release asset
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd dist
          package_dir="vnc-typer-${{ github.ref_name }}-${{ matrix.name }}"
          mv vnc-typer "${package_dir}"
          python -m zipfile -c "../vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}" "${package_dir}"

      - name: Package release asset
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          package_dir="vnc-typer-${{ github.ref_name }}-${{ matrix.name }}"
          mv vnc-typer "${package_dir}"
          tar -czf "../vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}" "${package_dir}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}
          generate_release_notes: true
