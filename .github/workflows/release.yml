name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            add_data: "icon.png:."
            icon_arg: "--icon icon.icns"
            codesign_arg: "--codesign-identity -"
            vncdo_bundle_mode: ""
            windowed: ""
            archive_suffix: macos.zip
          - name: linux-x86_64
            os: ubuntu-latest
            add_data: "icon.png:."
            icon_arg: ""
            codesign_arg: ""
            vncdo_bundle_mode: "--onefile"
            windowed: ""
            archive_suffix: linux-x86_64.tar.gz
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            add_data: "icon.png:."
            icon_arg: ""
            codesign_arg: ""
            vncdo_bundle_mode: "--onefile"
            windowed: ""
            archive_suffix: linux-aarch64.tar.gz
          - name: windows
            os: windows-latest
            add_data: "icon.png;."
            icon_arg: "--icon icon.ico"
            codesign_arg: ""
            vncdo_bundle_mode: "--onefile"
            windowed: "--windowed"
            archive_suffix: windows.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate release version module
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          printf 'APP_VERSION = "%s"\n' "$version" > version.py

      - name: Generate Windows app icon
        if: runner.os == 'Windows'
        run: python scripts/make_ico.py icon.png icon.ico

      - name: Generate macOS app icon
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir icon.iconset
          sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build vnc-typer
        run: >
          pyinstaller
          --noconfirm
          --clean
          ${{ matrix.windowed }}
          --name vnc-typer
          ${{ matrix.icon_arg }}
          ${{ matrix.codesign_arg }}
          --add-data "${{ matrix.add_data }}"
          main.py

      - name: Build bundled vncdo command
        run: >
          pyinstaller
          --noconfirm
          --clean
          --console
          ${{ matrix.vncdo_bundle_mode }}
          --name vncdo
          ${{ matrix.codesign_arg }}
          --distpath dist/vnc-typer
          vncdo_launcher.py

      - name: Package macOS release asset
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          ditto -c -k --keepParent vnc-typer "../vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}"

      - name: Package release asset
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd dist
          python -m zipfile -c "../vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}" vnc-typer

      - name: Package release asset
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          tar -czf "../vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}" vnc-typer

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: vnc-typer-${{ github.ref_name }}-${{ matrix.archive_suffix }}
          generate_release_notes: true
